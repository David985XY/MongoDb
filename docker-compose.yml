version: '3.8'
 
services:
  mongodb-botiga:
    image: mongo:7.0
    container_name: mongodb-botiga
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: $admin
      MONGO_INITDB_ROOT_PASSWORD: $123
    volumes:
      - ./data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    networks:
      - xarxa-botiga
 
  mongoexpress-botiga:
    image: mongo-express:1.0
    container_name: mongoexpress-botiga
    ports:
      - "8081:8081"
    depends_on:
      - mongodb-botiga
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: $admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: $123
      ME_CONFIG_MONGODB_URL: mongodb://$admin:$123@mongodb-botiga:27017/
    restart: unless-stopped
    networks:
      - xarxa-botiga
 
networks:
  xarxa-botiga:
    driver: bridge